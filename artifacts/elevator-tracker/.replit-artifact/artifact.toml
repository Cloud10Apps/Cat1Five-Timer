kind = "web"
previewPath = "/"
title = "Elevator Inspection Tracker"
version = "1.0.0"
id = "artifacts/elevator-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23706

[services.development]
run = "pnpm --filter @workspace/elevator-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/elevator-tracker", "run", "build" ]
publicDir = "artifacts/elevator-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23706"
BASE_PATH = "/"
