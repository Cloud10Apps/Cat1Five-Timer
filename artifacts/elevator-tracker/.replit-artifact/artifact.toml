kind = "web"
previewPath = "/"
title = "Cat1Five-Timer"
version = "1.0.0"
id = "artifacts/elevator-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23706

[services.development]
run = "pnpm --filter @workspace/elevator-tracker run dev"

[services.production]
serve = "static"
publicDir = "artifacts/elevator-tracker/dist/public"

[services.production.build]
args = ["sh", "-c", "pnpm --filter @workspace/elevator-tracker run build"]

[services.production.build.env]
NODE_ENV = "production"
BASE_PATH = "/"
PORT = "23706"

[services.env]
PORT = "23706"
BASE_PATH = "/"
